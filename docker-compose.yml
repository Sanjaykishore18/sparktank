version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: VoiceCraft-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - VoiceCraft-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: VoiceCraft-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/VoiceCraft
      - JWT_SECRET=${JWT_SECRET:-VoiceCraft_jwt_secret_change_in_production}
      - JWT_EXPIRES_IN=7d
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - VoiceCraft-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: VoiceCraft-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - VoiceCraft-network
    restart: unless-stopped

volumes:
  mongo-data:


networks:
  VoiceCraft-network:
    driver: bridge
